name: 'Cupom Digital'
description: ''
endpoints:
  -
    httpMethods:
      - GET
    uri: api/v1/cupom
    metadata:
      groupName: 'Cupom Digital'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Consulta os dados completos de um cupom fiscal (itens e cliente)'
      description: |-
        Retorna todos os itens registrados no cupom com descrição do produto, valores, descontos e promoções,
        além dos dados do cliente associado (CPF/CNPJ) quando identificado.
        Ideal para montar a visualização de um cupom fiscal digital.

        O fluxo interno executa 3 consultas:
        1. Busca o `seqdocto` na tabela `TB_DOCTO` usando empresa + checkout + COO
        2. Recupera os itens do cupom em `TB_DOCTOITEM` com JOIN em `yandeh_produto` para descrição
        3. Busca o cliente em `TB_DOCTOCUPOM` (opcional, pode não existir)
      authenticated: false
      deprecated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      nroempresa:
        name: nroempresa
        description: 'Número da empresa no ERP.'
        required: true
        example: 2
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      nrocheckout:
        name: nrocheckout
        description: 'Número do checkout (caixa) que emitiu o cupom.'
        required: true
        example: 11
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      coo:
