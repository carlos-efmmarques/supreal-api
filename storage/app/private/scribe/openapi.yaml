      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the token.'
        example: architecto
        required: true
        schema:
          type: string
  '/api/tokens/{id}/revoke':
