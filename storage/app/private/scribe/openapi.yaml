                  example: '2052-04-06'
                  nullable: true
                is_active:
                  type: boolean
                  description: ''
                  example: false
                  nullable: false
                ip_restriction:
                  type: string
                  description: 'Must be a valid IP address.'
                  example: 1.102.226.211
                  nullable: true
                rate_limit:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 1000.'
                  example: 7
                  nullable: false
                metadata:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
