openapi: 3.0.3
info:
  title: 'Supreal API API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1'
tags:
  -
    name: 'Cupom Digital'
    description: ''
  -
    name: Endpoints
    description: ''
  -
    name: Example
    description: ''
