  /api/tokens:
    get:
      summary: ''
      operationId: getApiTokens
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Chave mestra não fornecida. Use o header X-Master-Key.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Chave mestra não fornecida. Use o header X-Master-Key.'
                  data:
                    type: string
                    example: null
      tags:
        - Endpoints
      security: []
    post:
      summary: ''
      operationId: postApiTokens
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                  nullable: false
                abilities:
                  type: array
                  description: ''
                  example:
                    - architecto
                  items:
                    type: string
                expires_at:
                  type: string
                  description: 'Must be a valid date. Must be a date after <code>now</code>.'
                  example: '2052-04-06'
                  nullable: true
                ip_restriction:
                  type: string
                  description: 'Must be a valid IP address.'
                  example: 1.102.226.211
                  nullable: true
                rate_limit:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 1000.'
                  example: 7
                  nullable: true
                metadata:
                  type: object
                  description: ''
                  example: null
                  nullable: true
                  properties: {  }
              required:
                - name
      security: []
  '/api/tokens/{id}':
