name: Build & Push k8s (Harbor)

# SIDE-BY-SIDE pipeline: does NOT touch the existing GitLab CI / .233 deploy.
# Builds on the in-cluster self-hosted runner (jump-01), pushes to the LAN-only
# Harbor, then bumps deploy/kustomization.yaml so Argo CD rolls it out to the
# cluster as api.k8s.supreal.com.br. Tag-bump commit carries [skip ci].

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - 'argocd/**'
      - '**.md'
      - '.github/**'
      - '.gitlab-ci.yml'

permissions:
  contents: write

concurrency:
  group: build-push-k8s
  cancel-in-progress: false

env:
  IMAGE: harbor.k8s.supreal.com.br/library/supreal-api

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: echo "$HARBOR_PASSWORD" | docker login harbor.k8s.supreal.com.br -u "$HARBOR_USERNAME" --password-stdin

      - name: Build & push
        run: |
          set -euo pipefail
          docker build --platform linux/amd64 \
            -t "$IMAGE:${{ steps.tag.outputs.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ steps.tag.outputs.sha }}"
          docker push "$IMAGE:latest"

      - name: Bump image tag in deploy/ and commit
        run: |
          set -euo pipefail
          sed -i "s/^\(\s*newTag:\).*/\1 ${{ steps.tag.outputs.sha }}/" deploy/kustomization.yaml
          git config user.name  "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit -m "ci: deploy ${{ steps.tag.outputs.sha }} [skip ci]" || { echo "no change"; exit 0; }
          git push

      - name: Free disk on jump-01 (image stays in Harbor; keep cache for speed)
        if: always()
        env:
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          docker rmi "$IMAGE:$SHA" "$IMAGE:latest" 2>/dev/null || true
          docker image prune -f || true
          docker builder prune -f --keep-storage 20gb || true
