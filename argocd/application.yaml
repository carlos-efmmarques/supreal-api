apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supreal-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/carlos-efmmarques/supreal-api.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: supreal-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
      limit: 5
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
